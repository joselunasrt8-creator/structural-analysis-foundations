<svg xmlns="http://www.w3.org/2000/svg" width="720" height="180" viewBox="0 0 720 180" role="img" aria-labelledby="title desc">
  <title id="title">Three-paper research progression</title>
  <desc id="desc">Three connected cards labeled Paper 1, Paper 2, and Paper 3 with arrows showing a blue to purple to green progression.</desc>
  <defs>
    <marker id="arrow-blue-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c3aed"/>
    </marker>
    <marker id="arrow-purple-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
    </marker>
  </defs>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <rect x="46" y="38" width="160" height="104" rx="18" fill="#0f172a" stroke="#38bdf8" stroke-width="4"/>
    <rect x="280" y="38" width="160" height="104" rx="18" fill="#0f172a" stroke="#a78bfa" stroke-width="4"/>
    <rect x="514" y="38" width="160" height="104" rx="18" fill="#0f172a" stroke="#4ade80" stroke-width="4"/>

    <path d="M 218 90 H 262" stroke="#7c3aed" stroke-width="5" marker-end="url(#arrow-blue-purple)"/>
    <path d="M 452 90 H 496" stroke="#22c55e" stroke-width="5" marker-end="url(#arrow-purple-green)"/>

    <path d="M 78 72 H 174 M 78 94 H 154 M 78 116 H 138" stroke="#38bdf8" stroke-width="5" opacity="0.95"/>
    <path d="M 312 72 H 408 M 312 94 H 388 M 312 116 H 372" stroke="#a78bfa" stroke-width="5" opacity="0.95"/>
    <path d="M 546 72 H 642 M 546 94 H 622 M 546 116 H 606" stroke="#4ade80" stroke-width="5" opacity="0.95"/>
  </g>

  <g font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="23" font-weight="700" text-anchor="middle">
    <text x="126" y="98" fill="#e0f2fe">Paper 1</text>
    <text x="360" y="98" fill="#ede9fe">Paper 2</text>
    <text x="594" y="98" fill="#dcfce7">Paper 3</text>
  </g>
</svg>
