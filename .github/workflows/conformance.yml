name: Conformance validation

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: conformance-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  conformance:
    name: Paper 1 dependency predicate conformance
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate canonical fixture schemas
        run: python tools/validate_canonical_fixtures.py

      - name: Run reference harness validation
        run: python -m conformance --fixture conformance/fixtures/dependency-predicate.fixture.json

      - name: Observe external dependency-algebra adapter
        run: python -m conformance --fixture conformance/fixtures/dependency-predicate.external.fixture.json

      - name: Upload conformance artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: paper1-dependency-predicate-conformance
          path: conformance/artifacts/
          if-no-files-found: error
